,&quot;&quot;],&quot;techStack&quot;:[1,[]],&quot;liveUrl&quot;:[0,&quot;https://portfolio-nine-weld-16.vercel.app&quot;],&quot;githubUrl&quot;:[0,&quot;https://github.com/GuidoDevJ/Portfolio&quot;],&quot;stars&quot;:[0,0],&quot;language&quot;:[0,&quot;CSS&quot;],&quot;readme&quot;:[0,&quot;# Astro Starter Kit: Minimal\n\n```\nnpm create astro@latest -- --template minimal\n```\n\n[![Open in StackBlitz](https://developer.stackblitz.com/img/open_in_stackblitz.svg)](https://stackblitz.com/github/withastro/astro/tree/latest/examples/minimal)\n[![Open with CodeSandbox](https://assets.codesandbox.io/github/button-edit-lime.svg)](https://codesandbox.io/p/sandbox/github/withastro/astro/tree/latest/examples/minimal)\n[![Open in GitHub Codespaces](https://github.com/codespaces/badge.svg)](https://codespaces.new/withastro/astro?devcontainer_path=.devcontainer/minimal/devcontainer.json)\n\n&gt; 🧑‍🚀 **Seasoned astronaut?** Delete this file. Have fun!\n\n## 🚀 Project Structure\n\nInside of your Astro project, you&#39;ll see the following folders and files:\n\n```\n/\n├── public/\n├── src/\n│   └── pages/\n│       └── index.astro\n└── package.json\n```\n\nAstro looks for `.astro` or `.md` files in the `src/pages/` directory. Each page is exposed as a route based on its file name.\n\nThere&#39;s nothing special about `src/components/`, but that&#39;s where we like to put any Astro/React/Vue/Svelte/Preact components.\n\nAny static assets, like images, can be placed in the `public/` directory.\n\n## 🧞 Commands\n\nAll commands are run from the root of the project, from a terminal:\n\n| Command                | Action                                           |\n| :--------------------- | :----------------------------------------------- |\n| `npm install`          | Installs dependencies                            |\n| `npm run dev`          | Starts local dev server at `localhost:3000`      |\n| `npm run build`        | Build your production site to `./dist/`          |\n| `npm run preview`      | Preview your build locally, before deploying     |\n| `npm run astro ...`    | Run CLI commands like `astro add`, `astro check` |\n| `npm run astro --help` | Get help using the Astro CLI                     |\n\n## 👀 Want to learn more?\n\nFeel free to check [our documentation](https://docs.astro.build) or jump into our [Discord server](https://astro.build/chat).\n&quot;],&quot;pushedAt&quot;:[0,&quot;2026-04-15T03:18:53Z&quot;]}],[0,{&quot;id&quot;:[0,&quot;1207958596&quot;],&quot;title&quot;:[0,&quot;Personal Ai Agent&quot;],&quot;description&quot;:[0,&quot;No description available.&quot;],&quot;image&quot;:[0,&quot;&quot;],&quot;techStack&quot;:[1,[]],&quot;liveUrl&quot;:[0],&quot;githubUrl&quot;:[0,&quot;https://github.com/GuidoDevJ/personal-ai-agent&quot;],&quot;stars&quot;:[0,0],&quot;language&quot;:[0,&quot;Python&quot;],&quot;readme&quot;:[0,&quot;# Personal AI Agent\n\nA RAG-based conversational agent that answers questions about a personal profile. Built on AWS Bedrock, LangGraph, and Pinecone — deployed as a containerized FastAPI service.\n\n## Architecture\n\n```\n┌─────────────┐     POST /chat      ┌──────────────────────────────────────────┐\n│   Client    │ ──────────────────► │                FastAPI                   │\n└─────────────┘                     └───────────────────┬──────────────────────┘\n                                                        │\n                                                        ▼\n                                          ┌─────────────────────────┐\n                                          │     LangGraph Agent      │\n                                          │   (create_react_agent)   │\n                                          └────────────┬────────────┘\n                                                       │  tool call\n                                                       ▼\n                                          ┌─────────────────────────┐\n                                          │      retrieve_data       │\n                                          │   similarity_search k=1  │\n                                          └────────────┬────────────┘\n                                                       │\n                                                       ▼\n                                          ┌─────────────────────────┐\n                                          │   Pinecone Vector Store  │\n                                          │   (amazon.titan-embed)   │\n                                          └─────────────────────────┘\n```\n\n### Ingestion pipeline (`src/main.py`)\n\n```\nPDF → PyPDFLoader → RecursiveCharacterTextSplitter → BedrockEmbeddings → Pinecone\n       (pypdf)         chunk=1000 / overlap=200          (Titan v2)       index\n```\n\n## Tech stack\n\n| Layer | Technology |\n|---|---|\n| Runtime | Python 3.11 |\n| API | FastAPI + Uvicorn |\n| Agent framework | LangGraph 1.1 (`create_react_agent`) |\n| LLM | AWS Bedrock — Claude 3 Haiku |\n| Embeddings | AWS Bedrock — Amazon Titan Embed Text v2 |\n| Vector store | Pinecone |\n| Observability | LangSmith |\n| Schema validation | Pydantic v2 |\n| Containerization | Docker (multi-stage, non-root) |\n\n## Project structure\n\n```\n├── src/\n│   ├── api.py                   # FastAPI app — REST endpoints\n│   ├── agent.py                 # LangGraph agent + invoke()\n│   ├── main.py                  # Ingestion pipeline (run once)\n│   ├── providers/\n│   │   ├── bedrock.py           # ChatBedrock + BedrockEmbeddings\n│   │   └── pinecone.py          # Pinecone client + VectorStore\n│   ├── tools/\n│   │   └── retrieve_data.py     # LangChain tool — similarity search\n│   ├── utils/\n│   │   ├── read_pdf.py          # PDF loader\n│   │   ├── splitter.py          # Text splitter\n│   │   └── save_data.py         # Pinecone upsert\n│   └── schemas/\n│       └── personal_agent_type.py  # AgentPersonalResponse (Pydantic)\n├── docs/\n│   └── Profile_linkdin.pdf      # Source document\n├── dockerfile                   # Multi-stage build\n├── requirements.txt\n└── .env.example\n```\n\n## Getting started\n\n### Prerequisites\n\n- Python 3.11+\n- AWS account with Bedrock access (Claude 3 Haiku + Titan Embed v2 enabled)\n- Pinecone account\n\n### Setup\n\n```bash\n# 1. Clone and create virtual environment\npython -m venv venv &amp;&amp; source venv/bin/activate  # Windows: venv\\Scripts\\activate\n\n# 2. Install dependencies\npip install -r requirements.txt\n\n# 3. Configure environment\ncp .env.example .env\n# Edit .env with your credentials\n```\n\n### Environment variables\n\n```bash\n# LangSmith (observability)\nLANGCHAIN_TRACING_V2=true\nLANGCHAIN_ENDPOINT=https://api.smith.langchain.com\nLANGCHAIN_API_KEY=\nLANGCHAIN_PROJECT=\&quot;personal-ai-agent\&quot;\n\n# Pinecone\nPINECONE_API_KEY=\nPINECONE_INDEX_NAME=personalinfo\n\n# AWS / Bedrock\nAWS_REGION=us-east-1\nAWS_ACCESS_KEY_ID=\nAWS_SECRET_ACCESS_KEY=\nBEDROCK_MODEL_ID=anthropic.claude-3-haiku-20240307-v1:0\nBEDROCK_EMBEDDINGS_MODEL_ID=amazon.titan-embed-text-v2:0\n```\n\n### Ingest documents\n\nRun once to embed and store the PDF in Pinecone:\n\n```bash\npython src/main.py\n```\n\n### Run the API\n\n```bash\n# Development\nuvicorn src.api:app --reload --host 0.0.0.0 --port 8000\n\n# Production (Docker)\ndocker build -t personal-ai-agent .\ndocker run -p 8000:8000 --env-file .env personal-ai-agent\n```\n\n## API reference\n\n### `GET /health`\n\n```json\n{ \&quot;status\&quot;: \&quot;healthy\&quot; }\n```\n\n### `POST /chat`\n\n```json\n// Request\n{ \&quot;message\&quot;: \&quot;¿Qué experiencia tiene en AWS?\&quot; }\n\n// Response\n{ \&quot;response\&quot;: \&quot;Guido tiene experiencia en implementación de microservicios en AWS...\&quot; }\n```\n\n## Design decisions\n\n**Single LLM call per request** — structured output via `with_structured_output` is incompatible with Bedrock when tool calls are involved (AWS rejects conversations ending in an assistant message when tools were used). The agent returns plain text which is then parsed locally into the response schema, eliminating the need for a second LLM call.\n\n**`k=1` retrieval** — the source document is a single-subject profile. One chunk provides sufficient context while minimizing token usage per request.\n\n**Non-root Docker user** — the container runs as `appuser` (UID 1001) with no shell access, following least-privilege principles for production deployments.\n&quot;],&quot;pushedAt&quot;:[0,&quot;2026-04-15T02:53:13Z&quot;]}],[0,{&quot;id&quot;:[0,&quot;1149277084&quot;],&quot;title&quot;:[0,&quot;Benefits Search Api&quot;],&quot;description&quot;:[0,&quot;No description available.&quot;],&quot;image&quot;:[0,&quot;&quot;],&quot;techStack&quot;:[1,[]],&quot;liveUrl&quot;:[0],&quot;githubUrl&quot;:[0,&quot;https://github.com/GuidoDevJ/benefits-search-api&quot;],&quot;stars&quot;:[0,0],&quot;language&quot;:[0,&quot;Python&quot;],&quot;readme&quot;:[0],&quot;pushedAt&quot;:[0,&quot;2026-04-13T22:01:10Z&quot;]}],[0,{&quot;id&quot;:[0,&quot;966419816&quot;],&quot;title&quot;:[0,&quot;Bar Wise&quot;],&quot;description&quot;:[0,&quot;No description available.&quot;],&quot;image&quot;:[0,&quot;&quot;],&quot;techStack&quot;:[1,[]],&quot;liveUrl&quot;:[0],&quot;githubUrl&quot;:[0,&quot;https://github.com/GuidoDevJ/bar-wise&quot;],&quot;stars&quot;:[0,0],&quot;language&quot;:[0,&quot;TypeScript&quot;],&quot;readme&quot;:[0,&quot;This is a [Next.js](https://nextjs.org) project bootstrapped with [`create-next-app`](https://nextjs.org/docs/app/api-reference/cli/create-next-app).\n\n## Getting Started\n\nFirst, run the development server:\n\n```bash\nnpm run dev\n# or\nyarn dev\n# or\npnpm dev\n# or\nbun dev\n```\n\nOpen [http://localhost:3000](http://localhost:3000) with your browser to see the result.\n\nYou can start editing the page by modifying `app/page.tsx`. The page auto-updates as you edit the file.\n\nThis project uses [`next/font`](https://nextjs.org/docs/app/building-your-appli
